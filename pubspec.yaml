name: nova_player
description: Nova Player - A modern local media player and downloader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Audio
  just_audio: ^0.9.39
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.13
  audio_session: ^0.1.21

  # Video
  video_player: ^2.8.6
  chewie: ^1.7.5
  wakelock_plus: ^1.2.5

  # Media / Files
  on_audio_query: ^2.9.0
  photo_manager: ^3.3.0
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  path: ^1.9.0
  mime: ^1.0.5
  flutter_cache_manager: ^3.3.1

  # Downloads
  dio: ^5.4.3+1
  flutter_downloader: ^1.11.7

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # Permissions
  permission_handler: ^11.3.1

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.4
  badges: ^3.1.2

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.3.0
  rxdart: ^0.27.7
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
